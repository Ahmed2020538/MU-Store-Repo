kind = "web"
previewPath = "/"
title = "MU Store"
version = "1.0.0"
id = "artifacts/mu-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20605

[services.development]
run = "pnpm --filter @workspace/mu-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mu-store", "run", "build" ]
publicDir = "artifacts/mu-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20605"
BASE_PATH = "/"
