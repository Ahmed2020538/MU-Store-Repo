openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MU Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Cart operations
  - name: orders
    description: Order operations
  - name: auth
    description: Authentication operations
  - name: wishlist
    description: Wishlist operations
  - name: reviews
    description: Review operations
  - name: admin
    description: Admin operations
  - name: promo
    description: Promo code operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: size
          in: query
          schema: { type: string }
        - name: color
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, price_asc, price_desc, best_selling, most_reviewed] }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a product (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

    put:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Delete a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/{productId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user orders
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get user wishlist
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /wishlist/{productId}:
    post:
      operationId: addToWishlist
      tags: [wishlist]
      summary: Add product to wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      summary: Remove product from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a product review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /products/{id}/reviews:
    get:
      operationId: getProductReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /promo/validate:
    post:
      operationId: validatePromo
      tags: [promo]
      summary: Validate a promo code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoInput"
      responses:
        "200":
          description: Promo valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoResult"
        "404":
          description: Invalid code

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: Admin list all orders
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}/status:
    put:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/dashboard:
    get:
      operationId: adminDashboard
      tags: [dashboard]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/customers:
    get:
      operationId: adminListCustomers
      tags: [admin]
      summary: Admin list all customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      required: [id, name, price, categoryId, images, stock]
      properties:
        id: { type: integer }
        name: { type: string }
        nameAr: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        descriptionAr: { type: ["string", "null"] }
        price: { type: number }
        salePrice: { type: ["number", "null"] }
        categoryId: { type: integer }
        categoryName: { type: ["string", "null"] }
        images: { type: array, items: { type: string } }
        sizes: { type: array, items: { type: string } }
        colors: { type: array, items: { type: string } }
        stock: { type: integer }
        material: { type: ["string", "null"] }
        modelUrl: { type: ["string", "null"] }
        isNew: { type: boolean }
        isSale: { type: boolean }
        isFeatured: { type: boolean }
        rating: { type: ["number", "null"] }
        reviewCount: { type: integer }
        soldCount: { type: integer }
        createdAt: { type: string }

    ProductList:
      type: object
      required: [products, total, page, limit]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    ProductInput:
      type: object
      required: [name, price, categoryId, stock]
      properties:
        name: { type: string }
        nameAr: { type: string }
        description: { type: string }
        descriptionAr: { type: string }
        price: { type: number }
        salePrice: { type: number }
        categoryId: { type: integer }
        images: { type: array, items: { type: string } }
        sizes: { type: array, items: { type: string } }
        colors: { type: array, items: { type: string } }
        stock: { type: integer }
        material: { type: string }
        modelUrl: { type: string }
        isNew: { type: boolean }
        isSale: { type: boolean }
        isFeatured: { type: boolean }

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: integer }
        name: { type: string }
        nameAr: { type: ["string", "null"] }
        slug: { type: string }
        image: { type: ["string", "null"] }
        productCount: { type: integer }

    CartItem:
      type: object
      required: [productId, quantity, size, color, product]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        size: { type: string }
        color: { type: string }
        product:
          $ref: "#/components/schemas/Product"

    Cart:
      type: object
      required: [items, subtotal, shipping, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal: { type: number }
        shipping: { type: number }
        discount: { type: number }
        total: { type: number }
        promoCode: { type: ["string", "null"] }

    CartItemInput:
      type: object
      required: [productId, quantity, size, color]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        size: { type: string }
        color: { type: string }

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer }
        size: { type: string }
        color: { type: string }

    OrderItem:
      type: object
      required: [productId, quantity, size, color, price, productName]
      properties:
        productId: { type: integer }
        productName: { type: string }
        quantity: { type: integer }
        size: { type: string }
        color: { type: string }
        price: { type: number }
        image: { type: ["string", "null"] }

    Order:
      type: object
      required: [id, userId, status, items, subtotal, shipping, total, createdAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        status: { type: string, enum: [pending, confirmed, packed, shipped, delivered, cancelled] }
        paymentMethod: { type: ["string", "null"] }
        paymentStatus: { type: ["string", "null"] }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        fullName: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        governorate: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        subtotal: { type: number }
        shipping: { type: number }
        discount: { type: number }
        total: { type: number }
        promoCode: { type: ["string", "null"] }
        createdAt: { type: string }

    OrderInput:
      type: object
      required: [items, fullName, phone, email, governorate, address, paymentMethod]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        fullName: { type: string }
        phone: { type: string }
        email: { type: string }
        governorate: { type: string }
        address: { type: string }
        paymentMethod: { type: string }
        promoCode: { type: string }
        subtotal: { type: number }
        shipping: { type: number }
        discount: { type: number }
        total: { type: number }
        codDownPayment: { type: number }
        codDownPaymentStatus: { type: string }
        codDownPaymentMethod: { type: string }

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, confirmed, packed, shipped, delivered, cancelled] }

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        phone: { type: ["string", "null"] }
        role: { type: string, enum: [customer, admin] }
        loyaltyPoints: { type: integer }
        createdAt: { type: string }

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string }
        password: { type: string }
        name: { type: string }
        phone: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    Review:
      type: object
      required: [id, productId, userId, rating, createdAt]
      properties:
        id: { type: integer }
        productId: { type: integer }
        userId: { type: integer }
        userName: { type: ["string", "null"] }
        rating: { type: integer }
        comment: { type: ["string", "null"] }
        createdAt: { type: string }

    ReviewInput:
      type: object
      required: [productId, rating]
      properties:
        productId: { type: integer }
        rating: { type: integer }
        comment: { type: string }

    PromoInput:
      type: object
      required: [code]
      properties:
        code: { type: string }
        cartTotal: { type: number }

    PromoResult:
      type: object
      required: [code, discountType, discountValue]
      properties:
        code: { type: string }
        discountType: { type: string, enum: [percentage, free_shipping, fixed] }
        discountValue: { type: number }
        discountAmount: { type: number }

    DashboardSummary:
      type: object
      required: [totalRevenue, totalOrders, totalProducts, totalCustomers, ordersToday, revenueByCategory, recentOrders, ordersByStatus]
      properties:
        totalRevenue: { type: number }
        totalOrders: { type: integer }
        totalProducts: { type: integer }
        totalCustomers: { type: integer }
        ordersToday: { type: integer }
        revenueByCategory:
          type: array
          items:
            type: object
            required: [category, revenue]
            properties:
              category: { type: string }
              revenue: { type: number }
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        ordersByStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status: { type: string }
              count: { type: integer }

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }
